<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex"><title>NAC Film Scripts — site-visit portal</title>
<style>
:root{--nac:#1800ad;--org:#F4622A;--ink:#12121a;--mut:#6b6b78;--line:#e7e7ee;--bg:#f6f6fb;--card:#fff}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg);padding-bottom:calc(30px + env(safe-area-inset-bottom,0))}
.top{position:sticky;top:0;z-index:9;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line);padding:11px 14px calc(9px + env(safe-area-inset-top,0)/4)}
.top .r1{display:flex;align-items:center;gap:10px}
.brand{font-weight:800;font-size:16px;letter-spacing:-.01em;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand small{color:var(--mut);font-weight:600}
.lang{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-weight:700;font-size:12px;flex:0 0 auto}
.lang button{border:0;background:var(--card);color:var(--mut);padding:7px 11px;min-height:34px}
.lang button.on{background:var(--nac);color:#fff}
.tripbtn{border:1px solid var(--line);background:var(--card);border-radius:999px;font-weight:700;font-size:12.5px;padding:7px 12px;min-height:34px;color:var(--ink);display:inline-flex;align-items:center;gap:5px}
.tripbtn b{background:var(--org);color:#fff;border-radius:999px;font-size:11px;padding:1px 6px;min-width:18px;text-align:center}
.tripbtn.on{background:var(--nac);color:#fff;border-color:var(--nac)}
.search{margin-top:9px;width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:11px 12px;font-size:15px;min-height:44px}
.chips{display:flex;gap:7px;overflow-x:auto;padding:9px 2px 1px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:700;min-height:32px}
.chip.on{background:var(--nac);color:#fff;border-color:var(--nac)}
.wrap{padding:14px}
.grid{display:grid;gap:11px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;position:relative}
.card .th{aspect-ratio:16/10;background:#e9e9f1 center/cover no-repeat;position:relative}
.card .star{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;border:0;background:rgba(0,0,0,.42);color:#fff;font-size:16px;display:grid;place-items:center;backdrop-filter:blur(4px)}
.card .star.on{background:var(--org)}
.card .bd{padding:11px 12px 12px}
.card .nm{font-weight:700;font-size:15px;letter-spacing:-.01em;display:block}
.card .lo{color:var(--mut);font-size:12.5px;margin-top:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .mt{color:var(--mut);font-size:12px;margin-top:7px;display:flex;gap:8px;align-items:center}
.pill{background:#eef0ff;color:var(--nac);border-radius:999px;font-weight:700;font-size:11px;padding:2px 8px}
.empty{color:var(--mut);text-align:center;padding:50px 20px;font-size:14.5px}
.tlist{display:flex;flex-direction:column;gap:9px}
.trow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px;cursor:pointer}
.trow .tth{width:64px;height:44px;flex:0 0 64px;border-radius:9px;background:#e9e9f1 center/cover no-repeat}
.trow .ti{flex:1;min-width:0}
.trow .ti b{display:block;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .ti small{color:var(--mut);font-size:12px}
.trow .rm{border:0;background:transparent;color:var(--mut);font-size:20px;padding:4px 8px}
.sum{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:12px;display:flex;gap:16px;align-items:center}
.sum b{font-size:22px;font-weight:800;color:var(--nac)}
.sum span{color:var(--mut);font-size:12.5px}
.btnrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:var(--card);border-radius:11px;font-weight:700;font-size:13px;padding:9px 13px;min-height:40px;color:var(--ink)}
.btn.pri{background:var(--nac);color:#fff;border-color:var(--nac)}
/* read view */
.rhead{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.back{border:1px solid var(--line);background:var(--card);border-radius:10px;min-width:40px;min-height:40px;font-size:17px}
.rtitle{flex:1;min-width:0}
.rtitle .rt{font-weight:800;font-size:17px;letter-spacing:-.01em;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rtitle .rl{color:var(--mut);font-size:12.5px}
.rbar{display:flex;align-items:center;gap:12px;margin:8px 0 4px}
.ring{--p:0;width:46px;height:46px;border-radius:50%;flex:0 0 46px;background:conic-gradient(var(--org) calc(var(--p)*1%),var(--line) 0);display:grid;place-items:center}
.ring::after{content:attr(data-p);width:36px;height:36px;border-radius:50%;background:var(--card);display:grid;place-items:center;font-size:11px;font-weight:800}
.rmeta{flex:1;font-size:12.5px;color:var(--mut)}
.grp{margin:18px 0 0}
.grp h2{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--nac);margin:0 0 8px;font-weight:800}
.gnote{margin:0 0 10px;font-size:12.5px;color:var(--mut);font-style:italic}
.sh{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:8px;min-height:52px;cursor:pointer}
.sh.hero{border-color:var(--org);box-shadow:0 0 0 1px var(--org) inset}
.sh input{width:24px;height:24px;flex:0 0 24px;margin:1px 0 0;accent-color:var(--org)}
.sh .id{font-weight:800;font-size:12px;color:var(--nac);flex:0 0 36px;padding-top:2px}
.sh.hero .id{color:var(--org)}
.sh .txt{flex:1;min-width:0}
.sh .txt b{font-weight:650;font-size:15px}
.sh .txt small{color:var(--mut);font-size:12.5px;margin-top:2px}
.sh.done .txt b{text-decoration:line-through;color:var(--mut)}
.sh.done .txt{opacity:.6}
.foot{margin:22px 0 0;color:var(--mut);font-size:12px;text-align:center}
/* script view (Notion reel) */
.scriptbadge{display:inline-flex;align-items:center;gap:5px;background:#eef0ff;color:var(--nac);border-radius:999px;font-weight:700;font-size:10.5px;padding:2px 7px;margin-top:6px}
.stbanner{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin:8px 0 4px}
.stbanner .stline{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.stat{border-radius:999px;font-weight:700;font-size:11px;padding:3px 9px;background:#f0f0f6;color:var(--mut)}
.stat.go{background:#e7f7ec;color:#128a3e}.stat.warn{background:#fff2e6;color:#b5590f}.stat.film{background:#ffe9e0;color:var(--org)}
.stbanner a{color:var(--nac);font-weight:700;font-size:12px;text-decoration:none}
.tabs{display:flex;gap:6px;margin:10px 0 2px}
.tab{flex:1;border:1px solid var(--line);background:var(--card);border-radius:11px;font-weight:700;font-size:13px;padding:9px;min-height:40px;color:var(--mut)}
.tab.on{background:var(--nac);color:#fff;border-color:var(--nac)}
.scut{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:8px}
.scut.done{opacity:.62}
.scut input{width:24px;height:24px;flex:0 0 24px;margin:1px 0 0;accent-color:var(--org)}
.scut .body{flex:1;min-width:0}
.scut .hd{display:flex;align-items:baseline;gap:8px}
.scut .num{font-weight:800;font-size:12px;color:var(--nac);flex:0 0 auto}
.scut .snm{font-weight:700;font-size:15px}
.scut.done .snm{text-decoration:line-through;color:var(--mut)}
.scut .dir{color:var(--mut);font-size:12.5px;margin-top:4px;font-style:italic}
.line{margin-top:8px;font-size:14px;border-left:3px solid var(--line);padding-left:9px}
.line .lb{font-weight:800;font-size:10px;letter-spacing:.05em;color:var(--mut);display:block;text-transform:uppercase}
.line.oncam{border-left-color:var(--org)}.line.vo{border-left-color:var(--nac)}
.cap{margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cap .cv{font-size:11px;color:var(--mut);font-family:ui-monospace,Menlo,monospace;background:#f4f4fa;border-radius:6px;padding:3px 7px}
.capbtn{display:inline-flex;align-items:center;gap:6px;background:var(--org);color:#fff;border-radius:10px;font-weight:700;font-size:13px;padding:9px 13px;min-height:40px;cursor:pointer}
.capbtn input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden}
.takes{margin-top:7px;display:flex;flex-direction:column;gap:6px}
.take{display:flex;align-items:center;gap:8px;background:#f7f7fc;border:1px solid var(--line);border-radius:10px;padding:7px 9px;font-size:12.5px}
.take .tn{flex:1;min-width:0;font-family:ui-monospace,Menlo,monospace;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.take .ok{color:#128a3e;font-weight:700;white-space:nowrap}
.take .up{color:var(--nac);font-weight:700;white-space:nowrap}
.take .er{color:#c0392b;font-weight:700;white-space:nowrap}
.take .tx{border:0;background:transparent;color:var(--mut);font-size:15px;padding:0 2px;cursor:pointer}
.seccount{font-weight:700;font-size:10.5px;color:var(--org);margin-left:6px;background:#ffe9e0;border-radius:999px;padding:1px 7px}
.wrapbtns{display:flex;gap:8px;margin:16px 0 0;flex-wrap:wrap}
.hide{display:none!important}
/* language toggle — active lang inline everywhere; block for the stacked shot text */
.vis-en,.vis-vi{display:none}
body:not(.vi) .vis-en{display:inline}
body.vi .vis-vi{display:inline}
body:not(.vi) .sh .txt .vis-en,body.vi .sh .txt .vis-vi{display:block}
@media(max-width:640px){.grid{grid-template-columns:1fr 1fr;gap:9px}.card .nm{font-size:13.5px}.card .bd{padding:9px 10px 10px}.wrap{padding:12px}}
@media(max-width:380px){.grid{grid-template-columns:1fr}}

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function LS(k,d){try{var v=localStorage.getItem(k);return v==null?d:JSON.parse(v)}catch(e){return d}}
function SS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function getTrip(){return LS('sl:trip',[])}
function setTrip(a){SS('sl:trip',a);paintTripN()}
function inTrip(s){return getTrip().indexOf(s)>=0}
function toggleTrip(s){var t=getTrip(),i=t.indexOf(s);if(i>=0)t.splice(i,1);else t.push(s);setTrip(t)}
function ticks(s){return LS('sl:ticks:'+s,{})}
function paintTripN(){document.getElementById('tripN').textContent=getTrip().length}
function countries(){var m={};DATA.forEach(function(l){if(l.country)m[l.country]=(m[l.country]||0)+1});return Object.keys(m).sort()}
function nm(l){return document.body.classList.contains('vi')&&l.nameVi?l.nameVi:l.name}

function renderChips(){
  var cs=countries(),h='<button class="chip'+(state.c==='All'?' on':'')+'" data-act="chip" data-c="All">All ('+DATA.length+')</button>';
  cs.forEach(function(c){h+='<button class="chip'+(state.c===c?' on':'')+'" data-act="chip" data-c="'+esc(c)+'">'+esc(c)+'</button>'});
  document.getElementById('chips').innerHTML=cs.length?h:'';
}
function match(l){
  if(state.c!=='All'&&l.country!==state.c)return false;
  if(!state.q)return true;
  var q=state.q.toLowerCase();
  return (l.name+' '+l.nameVi+' '+l.city+' '+l.country+' '+l.slug).toLowerCase().indexOf(q)>=0;
}
function renderBrowse(){
  filters.classList.remove('hide');crumb.textContent='';
  var list=DATA.filter(match).sort(function(a,b){return a.name.localeCompare(b.name)});
  if(!list.length){app.innerHTML='<div class="empty">No properties match.</div>';return}
  var h='<div class="grid">';
  list.forEach(function(l){
    var th=l.thumb?' style="background-image:url('+esc(l.thumb)+')"':'';
    var badge=l.script?'<span class="scriptbadge">📋 #'+esc(l.script.scriptNo)+' · '+esc(l.script.status)+'</span>':'';
    h+='<div class="card" data-act="open" data-slug="'+esc(l.slug)+'">'
      +'<div class="th"'+th+'><button class="star'+(inTrip(l.slug)?' on':'')+'" data-act="star" data-slug="'+esc(l.slug)+'">'+(inTrip(l.slug)?'★':'☆')+'</button></div>'
      +'<div class="bd"><span class="nm">'+esc(nm(l))+'</span><span class="lo">'+esc(l.city||'')+'</span>'
      +'<span class="mt"><span class="pill">'+l.shots+' shots</span> ~'+l.secs+'s</span>'+badge+'</div></div>';
  });
  app.innerHTML=h+'</div>';
}
function renderTrip(){
  filters.classList.add('hide');crumb.innerHTML='· <span class="vis-en">My trip</span><span class="vis-vi">Chuyến của tôi</span>';
  var t=getTrip().map(function(s){return BY[s]}).filter(Boolean);
  if(!t.length){app.innerHTML='<div class="empty"><span class="vis-en">No properties in your trip yet.<br>Star properties in Browse to prep them.</span><span class="vis-vi">Chưa có địa điểm nào.<br>Bấm ★ ở phần Duyệt để chuẩn bị.</span><div class="btnrow" style="justify-content:center"><button class="btn pri" data-act="go-browse">Browse properties</button></div></div>';return}
  var sh=t.reduce(function(a,l){return a+l.shots},0),se=t.reduce(function(a,l){return a+l.secs},0);
  var h='<div class="sum"><div><b>'+t.length+'</b><br><span><span class="vis-en">stops</span><span class="vis-vi">điểm</span></span></div>'
    +'<div><b>'+sh+'</b><br><span>shots</span></div><div><b>~'+se+'s</b><br><span><span class="vis-en">footage</span><span class="vis-vi">thời lượng</span></span></div></div>';
  h+='<div class="tlist">';
  t.forEach(function(l){
    var th=l.thumb?' style="background-image:url('+esc(l.thumb)+')"':'';
    h+='<div class="trow" data-act="open" data-slug="'+esc(l.slug)+'"><div class="tth"'+th+'></div>'
      +'<div class="ti"><b>'+esc(nm(l))+'</b><small>'+esc(l.city||'')+' · '+l.shots+' shots</small></div>'
      +'<button class="rm" data-act="star" data-slug="'+esc(l.slug)+'">✕</button></div>';
  });
  h+='</div><div class="btnrow"><button class="btn" data-act="go-browse">+ Add more</button></div>';
  app.innerHTML=h;
}
function readHead(l){
  var tabs=l.script?('<div class="tabs">'
    +'<button class="tab'+(state.tab!=='ideas'?' on':'')+'" data-act="tab" data-t="script">📋 Script #'+esc(l.script.scriptNo)+'</button>'
    +'<button class="tab'+(state.tab==='ideas'?' on':'')+'" data-act="tab" data-t="ideas">🎥 Shot ideas</button></div>'):'';
  return '<div class="rhead"><button class="back" data-act="go-browse">‹</button>'
    +'<div class="rtitle"><span class="rt">'+esc(nm(l))+'</span><span class="rl">'+esc(l.city||'')+'</span></div>'
    +(inTrip(l.slug)?'':'<button class="btn" data-act="star" data-slug="'+esc(l.slug)+'">🎒 Add</button>')+'</div>'+tabs;
}
// script Done store: explicit local overrides keyed by shot number; seeds from Notion "done"
function sdone(slug){return LS('sl:sdone:'+slug,{})}
function effDone(slug,sh){var st=sdone(slug);return st[sh.n]!==undefined?!!st[sh.n]:!!sh.done}
function scriptDoneCount(l){var n=0;l.script.sections.forEach(function(s){s.shots.forEach(function(sh){if(effDone(l.slug,sh))n++})});return n}
function langPick(o){if(!o)return '';var vi=document.body.classList.contains('vi');return (vi?(o.vi||o.en):(o.en||o.vi))||''}
// ── on-the-go clip capture ──
function secCode(name){var w=(name||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim().split(' ');return (w[0]||'sec').slice(0,10)}
function clipStore(slug){return LS('sl:clips:'+slug,{})}
function shotTakes(slug,n){var o=clipStore(slug);return o[n]||[]}
function totalClips(slug){var o=clipStore(slug),c=0;for(var k in o)c+=(o[k]||[]).length;return c}
function workerUrl(){var w=LS('sl:worker','')||'';while(w.slice(-1)==='/')w=w.slice(0,-1);return w}
function takesHtml(slug,n){
  return shotTakes(slug,n).map(function(t,i){
    var st=t.up==='done'?'<span class="ok">✓ '+(t.url?'up':'saved')+'</span>':(t.up==='uploading'?'<span class="up">↑…</span>':(t.up==='err'?'<span class="er">! retry</span>':'<span class="ok">● saved</span>'));
    return '<div class="take"><span class="tn">'+esc(t.name)+'</span>'+st+'<button class="tx" data-act="delclip" data-n="'+n+'" data-i="'+i+'">✕</button></div>';
  }).join('');
}
function updSecCounts(l){var o=clipStore(l.slug);l.script.sections.forEach(function(s,si){
  var c=0;s.shots.forEach(function(sh){c+=(o[sh.n]||[]).length});
  var el=document.getElementById('sc-'+si);if(el)el.textContent=c?('🎬 '+c):'';});}
function reTakes(n){var el=document.getElementById('tk-'+n);if(el)el.innerHTML=takesHtml(state.slug,n);
  var l=BY[state.slug];if(l&&l.script)updSecCounts(l);}
function uploadClip(w,file,name){
  return fetch(w+'/reel-clip?name='+encodeURIComponent(name),{headers:{'x-cc-key':LS('sl:cckey','')||''}})
    .then(function(r){if(!r.ok)throw 0;return r.json()})
    .then(function(j){if(!j||!j.uploadURL)throw 0;var fd=new FormData();fd.append('file',file,name);
      return fetch(j.uploadURL,{method:'POST',body:fd}).then(function(u){if(!u.ok)throw 0;return {uid:j.uid,url:j.playback||''}})});
}
function addClip(n,sec,file){
  var slug=state.slug,o=clipStore(slug);if(!o[n])o[n]=[];
  var name=slug+'__'+sec+'-s'+n+'-t'+(o[n].length+1)+'.mp4';
  var rec={name:name,size:file.size,ts:Date.now(),up:'saved'};o[n].push(rec);SS('sl:clips:'+slug,o);reTakes(n);
  var w=workerUrl();
  if(w){rec.up='uploading';SS('sl:clips:'+slug,o);reTakes(n);
    uploadClip(w,file,name).then(function(res){rec.up='done';rec.url=res.url;rec.uid=res.uid;SS('sl:clips:'+slug,o);reTakes(n)})
      .catch(function(){rec.up='err';SS('sl:clips:'+slug,o);reTakes(n)});}
}
function clipManifest(l){
  var o=clipStore(l.slug),lines=['CLIP MANIFEST — '+nm(l)+' · Script #'+l.script.scriptNo,'Total clips: '+totalClips(l.slug),''];
  l.script.sections.forEach(function(s){lines.push('['+s.name+']');
    s.shots.forEach(function(sh){(o[sh.n]||[]).forEach(function(t){lines.push('  '+t.name+(t.url?'  '+t.url:''))})});lines.push('')});
  return lines.join('\n');
}

function renderScript(l){
  var sc=l.script;
  var done=scriptDoneCount(l),pct=sc.total?Math.round(done/sc.total*100):0;
  var fs=sc.filmingStatus,fsc=fs==='Filmed'||fs==='Ready to Post'?'go':(fs==='Edited'?'go':'film');
  var h=readHead(l);
  h+='<div class="stbanner"><div class="stline">'
    +'<span class="stat go">'+esc(sc.status)+'</span>'
    +'<span class="stat '+fsc+'">🎬 '+esc(sc.filmingStatus)+'</span>'
    +(sc.platforms||[]).map(function(p){return '<span class="stat">'+esc(p)+'</span>'}).join('')
    +(sc.durationSec?'<span class="stat">~'+sc.durationSec+'s</span>':'')
    +(sc.hookType?'<span class="stat">Hook: '+esc(sc.hookType)+'</span>':'')
    +'</div><div class="stline" style="margin-top:8px">'
    +(sc.reelUrl?'<a href="'+esc(sc.reelUrl)+'" target="_blank" rel="noopener">↗ Reel in Notion</a>':'')
    +(sc.checklistUrl?'&nbsp;·&nbsp;<a href="'+esc(sc.checklistUrl)+'" target="_blank" rel="noopener">↗ Shot checklist</a>':'')
    +'</div></div>';
  h+='<div class="rbar"><div class="ring" id="ring" data-p="'+pct+'%" style="--p:'+pct+'"></div>'
    +'<div class="rmeta"><span id="rdone">'+done+'</span>/'+sc.total+' shots filmed · tap to tick as you shoot</div></div>';
  sc.sections.forEach(function(s,si){
    var code=secCode(s.name);
    h+='<section class="grp"><h2>'+esc(s.name)+'<span class="seccount" id="sc-'+si+'"></span></h2>';
    if(s.note)h+='<p class="gnote">'+esc(s.note)+'</p>';
    s.shots.forEach(function(sh){
      var on=effDone(l.slug,sh);
      h+='<div class="scut'+(on?' done':'')+'">'
        +'<input type="checkbox" data-sn="'+sh.n+'"'+(on?' checked':'')+'>'
        +'<div class="body"><div class="hd"><span class="num">'+(sh.n?sh.n+'.':'')+'</span><span class="snm">'+esc(sh.name)+'</span></div>';
      if(sh.direction)h+='<div class="dir">🎥 '+esc(sh.direction)+'</div>';
      var oc=langPick(sh.oncam);if(oc)h+='<div class="line oncam"><span class="lb">🎙️ On-cam'+(sh.oncam.secs?' · ~'+sh.oncam.secs+'s':'')+'</span>'+esc(oc)+'</div>';
      var vo=langPick(sh.vo);if(vo)h+='<div class="line vo"><span class="lb">🔊 VO'+(sh.vo.secs?' · ~'+sh.vo.secs+'s':'')+'</span>'+esc(vo)+'</div>';
      h+='<div class="cap"><span class="cv">'+esc(l.slug)+'__'+esc(code)+'-s'+sh.n+'</span>'
        +'<label class="capbtn">🎬 Add clip<input type="file" accept="video/*" data-cap="'+sh.n+'" data-sec="'+esc(code)+'"></label></div>'
        +'<div class="takes" id="tk-'+sh.n+'">'+takesHtml(l.slug,sh.n)+'</div>';
      h+='</div></div>';
    });
    h+='</section>';
  });
  h+='<div class="wrapbtns"><button class="btn pri" data-act="report">📋 Filming report</button>'
    +'<button class="btn" data-act="manifest">🎞️ Clip manifest</button>'
    +'<button class="btn" data-act="setup">⚙︎ Upload</button></div>';
  h+='<p class="foot">Tap 🎬 Add clip on each shot to drop in iPhone footage · auto-named per section · saved on this device</p>';
  app.innerHTML=h;
  updSecCounts(l);
}
function renderIdeas(l){
  var tk=ticks(l.slug),done=0;
  l.sections.forEach(function(s){s.shots.forEach(function(x){if(tk[x.id])done++})});
  var pct=l.shots?Math.round(done/l.shots*100):0;
  var h=readHead(l)
    +'<div class="rbar"><div class="ring" id="ring" data-p="'+pct+'%" style="--p:'+pct+'"></div>'
    +'<div class="rmeta"><span id="rdone">'+done+'</span>/'+l.shots+' shots · ~'+l.secs+'s · ★ = banner candidate</div></div>';
  l.sections.forEach(function(s){
    h+='<section class="grp"><h2>§'+s.id+' · <span class="vis-en">'+esc(s.en)+'</span><span class="vis-vi">'+esc(s.vi)+'</span></h2>';
    if(s.note_en)h+='<p class="gnote"><span class="vis-en">'+esc(s.note_en)+'</span><span class="vis-vi">'+esc(s.note_vi)+'</span></p>';
    s.shots.forEach(function(x){
      var on=tk[x.id];
      h+='<label class="sh'+(x.hero?' hero':'')+(on?' done':'')+'" data-id="'+x.id+'">'
        +'<input type="checkbox" data-id="'+x.id+'"'+(on?' checked':'')+'>'
        +'<span class="id">'+x.id+(x.hero?' ★':'')+'</span>'
        +'<span class="txt"><b class="vis-en">'+esc(x.en)+'</b><b class="vis-vi">'+esc(x.vi)+'</b>'
        +'<small class="vis-en">'+esc(x.move_en)+' · ~'+x.secs+'s · '+esc(x.why_en)+'</small>'
        +'<small class="vis-vi">'+esc(x.move_vi)+' · ~'+x.secs+'s · '+esc(x.why_vi)+'</small></span></label>';
    });
    h+='</section>';
  });
  h+='<p class="foot">Clip naming: <code>'+esc(l.slug)+'__&lt;ID&gt;.mp4</code> · ticks saved on this device</p>';
  app.innerHTML=h;
}
function renderRead(){
  filters.classList.add('hide');
  var l=BY[state.slug];if(!l){state.v='browse';return render()}
  crumb.textContent='';
  if(l.script && state.tab!=='ideas')renderScript(l);
  else renderIdeas(l);
}
function buildReport(l){
  var sc=l.script,o=clipStore(l.slug),lines=[];
  lines.push('FILMING REPORT — '+nm(l)+' · Script #'+sc.scriptNo);
  lines.push(scriptDoneCount(l)+'/'+sc.total+' shots filmed · '+totalClips(l.slug)+' clips · '+(sc.platforms||[]).join('+')+' · ~'+sc.durationSec+'s');
  lines.push('');
  sc.sections.forEach(function(s){
    lines.push('['+s.name+']');
    s.shots.forEach(function(sh){
      var nt=(o[sh.n]||[]).length,mark=effDone(l.slug,sh)?'[x]':'[ ]',link=nt?'  ('+nt+' clip'+(nt>1?'s':'')+')':'';
      lines.push('  '+mark+' '+(sh.n?sh.n+'. ':'')+sh.name+link);
    });
  });
  var missing=[];sc.sections.forEach(function(s){s.shots.forEach(function(sh){if(!effDone(l.slug,sh))missing.push(sh.n)})});
  lines.push('');lines.push('Still to shoot: '+(missing.length?missing.join(', '):'none — wrapped ✅'));
  return lines.join('\n');
}
function render(){
  if(state.v==='browse')renderBrowse();
  else if(state.v==='trip')renderTrip();
  else if(state.v==='read')renderRead();
  document.getElementById('tripBtn').classList.toggle('on',state.v==='trip');
  window.scrollTo(0,0);
}
function defaultTab(slug){return (BY[slug]&&BY[slug].script)?'script':'ideas'}
function nav(v,slug){state.v=v;state.slug=slug||'';if(v==='read')state.tab=defaultTab(slug);
  var h='#/'+v+(slug?'/'+slug:'');if(location.hash!==h)location.hash=h;render()}
function fromHash(){
  var p=(location.hash||'').replace(/^#\//,'').split('/');
  if(p[0]==='read'&&p[1]){state.v='read';state.slug=decodeURIComponent(p[1]);state.tab=defaultTab(state.slug)}
  else if(p[0]==='trip'){state.v='trip'}
  else{state.v='browse'}
  render();
}
function updRing(done,total){var pct=total?Math.round(done/total*100):0,r=document.getElementById('ring');
  if(r){r.style.setProperty('--p',pct);r.setAttribute('data-p',pct+'%')}
  var d=document.getElementById('rdone');if(d)d.textContent=done;}
function copyText(txt,btn){
  function ok(){if(btn){var o=btn.textContent;btn.textContent='✓ Copied';setTimeout(function(){btn.textContent=o},1500)}}
  try{navigator.clipboard.writeText(txt).then(ok,function(){fallback()})}catch(e){fallback()}
  function fallback(){var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');ok()}catch(e){}document.body.removeChild(ta)}
}
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-act]');if(!t)return;var a=t.dataset.act;
  if(a==='lang'){setLangMode(t.dataset.l==='vi');return}
  if(a==='chip'){state.c=t.dataset.c;renderChips();renderBrowse();return}
  if(a==='star'){e.preventDefault();e.stopPropagation();toggleTrip(t.dataset.slug);render();renderChips();return}
  if(a==='open'){nav('read',t.dataset.slug);return}
  if(a==='go-trip'){nav('trip');return}
  if(a==='go-browse'){nav('browse');return}
  if(a==='tab'){state.tab=t.dataset.t;renderRead();return}
  if(a==='report'){var l=BY[state.slug];if(l&&l.script)copyText(buildReport(l),t);return}
  if(a==='manifest'){var l2=BY[state.slug];if(l2&&l2.script)copyText(clipManifest(l2),t);return}
  if(a==='delclip'){var o=clipStore(state.slug),n=t.dataset.n;if(o[n]){o[n].splice(+t.dataset.i,1);if(!o[n].length)delete o[n];SS('sl:clips:'+state.slug,o)}reTakes(n);return}
  if(a==='setup'){var cur=LS('sl:worker','')||'';var v=prompt('Cloudflare upload worker URL (blank = log clips locally only):',cur);
    if(v===null)return;SS('sl:worker',(v||'').trim());
    if((v||'').trim()){var ck=prompt('Cockpit access key (x-cc-key):',LS('sl:cckey','')||'');if(ck!==null)SS('sl:cckey',(ck||'').trim());alert('Uploads ON — clips go to Cloudflare Stream.')}
    else alert('Uploads off — clips logged on this device.');return}
});
document.addEventListener('change',function(e){
  var b=e.target,l=BY[state.slug];if(!l)return;
  if(b.type==='file'&&b.dataset.cap!==undefined){             // iPhone clip capture
    var f=b.files;if(f&&f.length){for(var i=0;i<f.length;i++)addClip(b.dataset.cap,b.dataset.sec,f[i])}b.value='';return;
  }
  if(b.type==='checkbox'&&b.dataset.id!==undefined){          // shot-ideas tick
    var tk=ticks(l.slug);if(b.checked)tk[b.dataset.id]=1;else delete tk[b.dataset.id];
    SS('sl:ticks:'+l.slug,tk);b.closest('.sh').classList.toggle('done',b.checked);
    var d=0;l.sections.forEach(function(s){s.shots.forEach(function(x){if(tk[x.id])d++})});updRing(d,l.shots);return;
  }
  if(b.type==='checkbox'&&b.dataset.sn!==undefined){          // script Done tick
    var st=sdone(l.slug);st[b.dataset.sn]=b.checked;SS('sl:sdone:'+l.slug,st);
    b.closest('.scut').classList.toggle('done',b.checked);updRing(scriptDoneCount(l),l.script.total);return;
  }
});
document.getElementById('q').addEventListener('input',function(){state.q=this.value;renderBrowse()});
window.addEventListener('hashchange',fromHash);
function setLangMode(vi){document.body.classList.toggle('vi',vi);
  document.getElementById('bVi').classList.toggle('on',vi);
  document.getElementById('bEn').classList.toggle('on',!vi);
  SS('sl:lang',vi?'vi':'en');render()}
setLangMode(LS('sl:lang','en')==='vi');
paintTripN();renderChips();fromHash();
</script></body></html>
