name: SEO Tasks → Validate + Draft Fixes

on:
  workflow_dispatch:
    inputs:
      max_tasks:
        description: "Max tasks to process per run"
        required: false
        default: "50"
      filter_priority:
        description: "Only this priority (P0/P1/P2). Empty = any."
        required: false
        default: "P0"
      filter_statuses:
        description: "Comma-separated statuses to process (New, Approved, etc.)"
        required: false
        default: "New"
      filter_auto_applicable:
        description: "Only Auto-Applicable tasks (true/false)"
        required: false
        default: "true"
      dry_run:
        description: "Print what would happen, no Notion writes (true/false)"
        required: false
        default: "true"
  push:
    paths:
      - ".github/triggers/seo-validate-draft.json"

concurrency:
  group: seo-validate-draft
  cancel-in-progress: false

jobs:
  validate-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Resolve params
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            F=.github/triggers/seo-validate-draft.json
            MAX=$(jq -r '.max_tasks // empty' "$F"); [ -z "$MAX" ] && MAX=50
            PRIO=$(jq -r '.filter_priority // empty' "$F"); [ -z "$PRIO" ] && PRIO=P0
            STATUSES=$(jq -r '.filter_statuses // empty' "$F"); [ -z "$STATUSES" ] && STATUSES=New
            AUTO=$(jq -r '.filter_auto_applicable // empty' "$F"); [ -z "$AUTO" ] && AUTO=true
            DRY=$(jq -r '.dry_run // empty' "$F"); [ -z "$DRY" ] && DRY=true
          else
            MAX="${{ inputs.max_tasks }}"
            PRIO="${{ inputs.filter_priority }}"
            STATUSES="${{ inputs.filter_statuses }}"
            AUTO="${{ inputs.filter_auto_applicable }}"
            DRY="${{ inputs.dry_run }}"
          fi
          echo "max_tasks=$MAX" >> $GITHUB_OUTPUT
          echo "filter_priority=$PRIO" >> $GITHUB_OUTPUT
          echo "filter_statuses=$STATUSES" >> $GITHUB_OUTPUT
          echo "filter_auto_applicable=$AUTO" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY" >> $GITHUB_OUTPUT
          echo "Resolved: max=$MAX, priority=$PRIO, statuses=$STATUSES, auto=$AUTO, dry=$DRY"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Validate + draft
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_TASKS: ${{ steps.params.outputs.max_tasks }}
          FILTER_PRIORITY: ${{ steps.params.outputs.filter_priority }}
          FILTER_STATUSES: ${{ steps.params.outputs.filter_statuses }}
          FILTER_AUTO_APPLICABLE: ${{ steps.params.outputs.filter_auto_applicable }}
          DRY_RUN: ${{ steps.params.outputs.dry_run }}
        run: node seo-validate-draft.mjs
