name: Apply LLP financials → Notion

# One-shot, idempotent writer for the bespoke per-building financials authored in
# LLP-GENERATION.md (parsed into scripts/au-financials.json). Matches Notion rows
# by 🔗 Slug and patches numeric fields only. Safe to re-run — unchanged rows are
# skipped. The next sync-notion tick propagates the numbers into the HTML, which
# de-bands the dashboard's fin/nac cells.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log the diff without writing to Notion"
        type: boolean
        default: false
      only:
        description: "Comma-separated slugs to restrict to (blank = all)"
        type: string
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/triggers/apply-financials.txt"

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Resolve dry-run / only
        # workflow_dispatch uses the inputs; a trigger-file push reads markers
        # from .github/triggers/apply-financials.txt — a line containing
        # "dry-run" forces a dry run; a line "only: slug-a,slug-b" scopes it.
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            FILE=.github/triggers/apply-financials.txt
            if grep -qi 'dry-run' "$FILE" 2>/dev/null; then echo "DRY_RUN=1" >> "$GITHUB_ENV"; fi
            ONLY_LINE=$(grep -i '^only:' "$FILE" 2>/dev/null | tail -1 | sed 's/^only:[[:space:]]*//I' || true)
            [ -n "$ONLY_LINE" ] && echo "ONLY=$ONLY_LINE" >> "$GITHUB_ENV"
          else
            [ "${{ inputs.dry_run }}" = "true" ] && echo "DRY_RUN=1" >> "$GITHUB_ENV"
            echo "ONLY=${{ inputs.only }}" >> "$GITHUB_ENV"
          fi
      - name: Apply financials
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node apply-llp-financials.mjs
