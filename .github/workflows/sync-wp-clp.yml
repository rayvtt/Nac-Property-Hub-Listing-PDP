name: Sync CLP HTML → WordPress

# Pushes country/<slug>.html into the matching WP page's raw_html_code ACF
# field. Mirrors sync-wp.yml for CLPs.

on:
  push:
    branches: [main]
    paths:
      - "country/*.html"
      - "scripts/sync-wp-clp.mjs"
      - "scripts/package.json"
      - ".github/workflows/sync-wp-clp.yml"
      - ".github/triggers/**"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      only_slug:
        description: "Sync just one slug (e.g. vn). Leave empty to sync all."
        required: false
        default: ""
  repository_dispatch:
    types: [notion-update, new-country]

concurrency:
  group: sync-wp-clp
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Push CLP HTML to WordPress
        id: run
        working-directory: scripts
        env:
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COUNTRY_DATABASE_ID: ${{ vars.NOTION_COUNTRY_DATABASE_ID || 'a01ef35ce9fd45b1bba3ec4de4da678c' }}
          WP_USER: ${{ vars.WP_USER || 'admin_web' }}
          WP_BASE_URL: ${{ vars.WP_BASE_URL || 'https://nomadassetcollective.com' }}
          WP_ACF_FIELD: ${{ vars.WP_ACF_FIELD || 'raw_html_code' }}
          ONLY_SLUG: ${{ github.event.inputs.only_slug }}
        continue-on-error: true
        run: |
          set +e
          node sync-wp-clp.mjs > /tmp/run.log 2>&1
          ec=$?
          echo "exit_code=$ec" >> $GITHUB_OUTPUT
          cat /tmp/run.log
          exit $ec

      - name: Commit debug log
        if: always()
        run: |
          mkdir -p .github/clp-debug
          {
            echo "===== run @ $(date -u +%Y-%m-%dT%H:%M:%SZ) ====="
            echo "exit_code: ${{ steps.run.outputs.exit_code }}"
            echo "workflow: sync-wp-clp.yml"
            echo "commit: ${{ github.sha }}"
            echo "----- script output -----"
            cat /tmp/run.log 2>/dev/null || echo "(no log file)"
            echo
          } > .github/clp-debug/sync-wp-clp.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/clp-debug/sync-wp-clp.log
          if git diff --cached --quiet; then
            echo "no log changes"
            exit 0
          fi
          git commit -m "debug: sync-wp-clp run log [skip ci]"
          git pull --rebase origin main || true
          git push origin HEAD:main
