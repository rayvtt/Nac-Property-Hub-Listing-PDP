name: Sync CLP HTML → WordPress

on:
  push:
    branches: [main]
    paths:
      - "country/*.html"
      - "scripts/sync-wp-clp.mjs"
      - "scripts/package.json"
      - ".github/workflows/sync-wp-clp.yml"
      - ".github/triggers/**"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      only_slug:
        description: "Sync just one slug (e.g. vn). Leave empty to sync all."
        required: false
        default: ""
  repository_dispatch:
    types: [notion-update, new-country]

concurrency:
  group: sync-wp-clp
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Push CLP HTML to WordPress
        id: run
        working-directory: scripts
        env:
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COUNTRY_DATABASE_ID: ${{ vars.NOTION_COUNTRY_DATABASE_ID || 'a01ef35ce9fd45b1bba3ec4de4da678c' }}
          WP_USER: ${{ vars.WP_USER || 'admin_web' }}
          WP_BASE_URL: ${{ vars.WP_BASE_URL || 'https://nomadassetcollective.com' }}
          WP_ACF_FIELD: ${{ vars.WP_ACF_FIELD || 'raw_html_code' }}
          ONLY_SLUG: ${{ github.event.inputs.only_slug }}
        continue-on-error: true
        run: |
          set +e
          node sync-wp-clp.mjs > /tmp/run.log 2>&1
          ec=$?
          echo "exit_code=$ec" >> $GITHUB_OUTPUT
          cat /tmp/run.log
          exit $ec

      - name: Post log to debug issue #192
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### sync-wp-clp · $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- exit_code: \`${{ steps.run.outputs.exit_code }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- event: \`${{ github.event_name }}\`"
            echo
            echo '```'
            cat /tmp/run.log 2>/dev/null | head -200 || echo "(no log file)"
            echo '```'
          } > /tmp/comment.md
          gh issue comment 192 --repo "${{ github.repository }}" --body-file /tmp/comment.md
