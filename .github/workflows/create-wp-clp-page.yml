name: Create WP Page for new Live country listings

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/triggers/**"
      - "scripts/create-wp-clp-page.mjs"
      - ".github/workflows/create-wp-clp-page.yml"
  repository_dispatch:
    types: [notion-update, new-country]

concurrency:
  group: create-wp-clp-page
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Create / link WP pages for Live country rows
        id: run
        working-directory: scripts
        env:
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_COUNTRY_DATABASE_ID: ${{ vars.NOTION_COUNTRY_DATABASE_ID || 'a01ef35ce9fd45b1bba3ec4de4da678c' }}
          WP_USER: ${{ vars.WP_USER || 'admin_web' }}
          WP_BASE_URL: ${{ vars.WP_BASE_URL || 'https://nomadassetcollective.com' }}
          WP_PROPERTY_HUB_PATH: ${{ vars.WP_PROPERTY_HUB_PATH || 'property-hub-bat-dong-san' }}
        continue-on-error: true
        run: |
          set +e
          node create-wp-clp-page.mjs > /tmp/run.log 2>&1
          ec=$?
          echo "exit_code=$ec" >> $GITHUB_OUTPUT
          cat /tmp/run.log
          exit $ec

      - name: Post log to debug issue #192
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### create-wp-clp-page · $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- exit_code: \`${{ steps.run.outputs.exit_code }}\`"
            echo "- commit: \`${{ github.sha }}\`"
            echo "- event: \`${{ github.event_name }}\`"
            echo
            echo '```'
            cat /tmp/run.log 2>/dev/null | head -200 || echo "(no log file)"
            echo '```'
          } > /tmp/comment.md
          gh issue comment 192 --repo "${{ github.repository }}" --body-file /tmp/comment.md
