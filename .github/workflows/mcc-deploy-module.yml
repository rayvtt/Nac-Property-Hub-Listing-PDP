name: Deploy Copy Review module into MCC cockpit

# Injects mcc/copy-review-module.html into the command-center Worker's
# dashboard HTML via the Cloudflare API — used because the cockpit repo is
# not reachable from the authoring session. Requires a Workers-scoped token:
#   secret CF_WORKERS_TOKEN  (Workers Scripts: Read + Edit on the NAC account)
#
# Drive it from the trigger file (last line of .github/triggers/mcc-deploy.txt):
#   mcc-deploy:<script-name>:dry     → fetch + patch in-memory, report only
#   mcc-deploy:<script-name>:apply   → patch + upload + verify (auto-rollback
#                                       to the original content on failure)
#
# Safety properties:
#   - aborts if the module marker is already present (idempotent)
#   - aborts if the worker source has no </body> to anchor on
#   - uploads via the /content endpoint, which PRESERVES the script's
#     settings/bindings; the original source is kept in-memory and restored
#     if post-deploy verification fails
#   - never prints or persists worker source (public repo, public logs)

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: "Cloudflare Worker script name (e.g. nac-command-center)"
        required: true
      mode:
        description: "dry or apply"
        required: true
        default: "dry"
  push:
    branches: [main]
    paths:
      - ".github/triggers/mcc-deploy.txt"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject module
        env:
          CF_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CF_ACCOUNT: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '2adeb401a00c6f459573f25eabb790da' }}
          IN_SCRIPT: ${{ github.event.inputs.script_name }}
          IN_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::secret CF_WORKERS_TOKEN is not set — add a Cloudflare API token with Workers Scripts Read+Edit"
            exit 1
          fi
          SCRIPT="$IN_SCRIPT"; MODE="$IN_MODE"
          if [ -z "$SCRIPT" ]; then
            LAST="$(tail -n1 .github/triggers/mcc-deploy.txt 2>/dev/null || true)"
            SCRIPT="$(echo "$LAST" | sed -n 's/.*mcc-deploy:\([A-Za-z0-9_-]\{1,\}\):.*/\1/p')"
            MODE="$(echo "$LAST" | sed -n 's/.*mcc-deploy:[A-Za-z0-9_-]\{1,\}:\(dry\|apply\).*/\1/p')"
          fi
          [ -n "$SCRIPT" ] || { echo "::error::no script name (input or trigger token)"; exit 1; }
          MODE="${MODE:-dry}"
          echo "target script: $SCRIPT · mode: $MODE"

          API="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/$SCRIPT"
          code=$(curl -s -o /tmp/original.js -w "%{http_code}" -H "Authorization: Bearer $CF_TOKEN" "$API/content")
          [ "$code" = "200" ] || { echo "::error::GET content → HTTP $code"; exit 1; }
          echo "fetched: $(stat -c%s /tmp/original.js) bytes"

          if grep -q 'id="mcc-copy-review"' /tmp/original.js; then
            echo "module already installed — nothing to do"; exit 0
          fi
          grep -q '</body>' /tmp/original.js || { echo "::error::no </body> anchor found in worker source"; exit 1; }

          python3 - <<'PY'
          import io, sys
          src = io.open('/tmp/original.js', encoding='utf8').read()
          mod = io.open('mcc/copy-review-module.html', encoding='utf8').read()
          # Worker HTML usually lives inside JS template literals — the module
          # is written backtick-free and dollar-brace-free, but verify anyway.
          for bad in ('`', '${'):
              if bad in mod:
                  sys.exit(f'module snippet contains {bad!r} — unsafe inside a template literal')
          i = src.rindex('</body>')
          io.open('/tmp/patched.js', 'w', encoding='utf8').write(src[:i] + '\n' + mod + '\n' + src[i:])
          print(f'patched: +{len(mod)} chars before final </body>')
          PY

          if [ "$MODE" != "apply" ]; then
            echo "DRY RUN ok — patch is viable. Re-fire with :apply to ship."; exit 0
          fi

          # module-syntax vs service-worker syntax → pick upload part type
          if grep -qE '^\s*export default|^\s*import ' /tmp/original.js; then
            MAIN='{"main_module":"worker.js"}'; CT='application/javascript+module'
          else
            MAIN='{"body_part":"worker.js"}'; CT='application/javascript'
          fi
          up=$(curl -s -o /tmp/up.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata=$MAIN;type=application/json" \
            -F "worker.js=@/tmp/patched.js;type=$CT" \
            "$API/content")
          [ "$up" = "200" ] || { echo "::error::PUT content → HTTP $up"; head -c 300 /tmp/up.json; exit 1; }
          echo "uploaded."

          vcode=$(curl -s -o /tmp/verify.js -w "%{http_code}" -H "Authorization: Bearer $CF_TOKEN" "$API/content")
          if [ "$vcode" = "200" ] && grep -q 'id="mcc-copy-review"' /tmp/verify.js; then
            echo "✅ verified — Copy Review module is live in $SCRIPT"
          else
            echo "::error::verification failed — rolling back"
            curl -s -o /dev/null -X PUT -H "Authorization: Bearer $CF_TOKEN" \
              -F "metadata=$MAIN;type=application/json" \
              -F "worker.js=@/tmp/original.js;type=$CT" "$API/content"
            exit 1
          fi
