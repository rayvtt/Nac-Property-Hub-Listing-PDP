name: Create PDP HTML for new Live listings

# Runs every 5 minutes.  For each Notion row with Hub Status = Live that has
# no properties/<slug>.html yet, it:
#   1. Creates the file from _template-listing-pdp.html
#   2. Immediately patches it with current Notion content (sync-notion.mjs)
#   3. Commits and pushes to main → triggers sync-wp.yml
#
# sync-wp.yml will skip listings with no Listing URL (populated later by the
# WP automation) and succeed automatically once that field is filled.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/triggers/**"
  repository_dispatch:
    types: [notion-update, new-listing]

concurrency:
  group: create-pdp
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Create PDP HTML for new Live listings
        id: scaffold
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node create-pdp.mjs

      - name: Patch new files with Notion content
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node sync-notion.mjs

      - name: Generate cinematic section titles from images
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-cine-titles.mjs

      - name: Ensure hist-glyph fix on all PDPs
        working-directory: scripts
        run: node fix-hist-glyph.mjs

      - name: Rebuild index.html from Notion
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node update-index.mjs

      - name: Commit and push (with rebase retry)
        run: |
          git config user.name "nac-notion-bot"
          git config user.email "nac-notion-bot@users.noreply.github.com"
          git add properties/ index.html llms.txt scripts/geocode-cache.json
          if git diff --cached --quiet; then
            echo "No new PDP files or index changes to commit."
            exit 0
          fi
          git commit -m "auto: scaffold PDP HTML + SEO/GEO/LLM data + rebuild index for new Live listings"

          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed — fetching and rebasing"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase conflict — bailing out"
              git rebase --abort
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Trigger image sync for newly-scaffolded listings
        if: steps.scaffold.outputs.new_slugs != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for slug in ${{ steps.scaffold.outputs.new_slugs }}; do
            echo "Dispatching sync-images.yml for $slug"
            gh workflow run sync-images.yml -f only_slug="$slug"
          done

      - name: Track + notify SEO/GEO/LLM scaffold (Notion)
        if: steps.scaffold.outputs.new_slugs != ''
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
          SEO_TASKS_DB_ID: ${{ vars.SEO_TASKS_DB_ID || 'ada6bd2f8c324773b0d026f9db78d3a2' }}
        run: node seo-scaffold-log.mjs "${{ steps.scaffold.outputs.new_slugs }}"
