name: Sync Images → Cloudflare

# Manual trigger only — image sync is an expensive operation (Drive download +
# PDF extract + CF upload), runs on-demand rather than on every push.
on:
  workflow_dispatch:
    inputs:
      only_slug:
        description: "Sync just one slug (e.g. fulham-reach-palmer-house-london). Leave empty to scan all Live listings with placeholder image URLs."
        required: false
        default: ""
      replace:
        description: "Re-upload even if Image URL is already a Cloudflare URL"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - ".github/triggers/**"
  repository_dispatch:
    types: [notion-update, new-listing]

concurrency:
  group: sync-images
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils imagemagick

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run image sync
        working-directory: scripts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || '2adeb401a00c6f459573f25eabb790da' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.only_slug }}" ]; then
            ARGS="--slug ${{ github.event.inputs.only_slug }}"
          fi
          if [ "${{ github.event.inputs.replace }}" = "true" ]; then
            ARGS="$ARGS --replace"
          fi
          # Chat-driven replace: workflow_dispatch isn't available to the app
          # integration (403), so a trigger-file push can request a full re-pick
          # by putting the token "sync-images:replace" on the LAST trigger line.
          # Optionally scope to a country: "sync-images:replace:Australia".
          # NB: this step runs in working-directory: scripts, so reference the
          # trigger file via $GITHUB_WORKSPACE (repo root), not a relative path.
          LAST_TRIGGER="$(tail -n1 "$GITHUB_WORKSPACE/.github/triggers/last-trigger.txt" 2>/dev/null || true)"
          # Single-slug re-pick: "sync-images:only:<slug>" → --slug <slug> --replace
          ONLY="$(echo "$LAST_TRIGGER" | sed -n 's/.*sync-images:only:\([a-z0-9-]\{1,\}\).*/\1/p')"
          if [ -n "$ONLY" ]; then
            echo "trigger requested single-slug re-pick: $ONLY"
            ARGS="--slug $ONLY --replace"
          fi
          if echo "$LAST_TRIGGER" | grep -qi 'sync-images:replace'; then
            echo "trigger requested --replace (full re-pick)"
            ARGS="$ARGS --replace"
            SCOPE="$(echo "$LAST_TRIGGER" | sed -n 's/.*sync-images:replace:\([A-Za-z]\{1,\}\).*/\1/p')"
            if [ -n "$SCOPE" ]; then
              echo "country scope: $SCOPE"
              export ONLY_COUNTRY="$SCOPE"
            fi
          fi
          node sync-images.mjs $ARGS
