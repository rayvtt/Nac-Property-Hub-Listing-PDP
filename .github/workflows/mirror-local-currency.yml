name: Mirror local currency → Notion

# One-shot (re-runnable) fill: for every Live non-USD listing, mirror
# Currency → Local Currency and Purchase Price → Local Price. Non-destructive +
# idempotent. Fire from the Actions tab, or push to the trigger file:
#   .github/triggers/mirror-currency.txt — include the word "dry" for a preview.

on:
  workflow_dispatch:
    inputs:
      dry:
        description: "Preview only (no writes)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - ".github/triggers/mirror-currency.txt"

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Resolve dry
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if grep -qi 'dry' .github/triggers/mirror-currency.txt 2>/dev/null; then echo "DRY=1" >> "$GITHUB_ENV"; fi
          else
            if [ "${{ inputs.dry }}" = "true" ]; then echo "DRY=1" >> "$GITHUB_ENV"; fi
          fi
      - name: Mirror local currency
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node mirror-local-currency.mjs
