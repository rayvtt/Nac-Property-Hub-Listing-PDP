name: Drive Tree (enumerate a folder)

# Reliable recursive enumeration of any Google Drive folder the user account can
# see — bypasses the search-index gap that returns partial child lists for
# cross-owner ("shared-with-me") folders. Drop a folder link via the trigger
# file (token "drive-tree:<folderId>" on the LAST line) or run manually; the
# full tree is written to drive-tree.json and committed back to main.

on:
  workflow_dispatch:
    inputs:
      folder:
        description: "Drive folder URL or ID to enumerate"
        required: true
        default: ""
  push:
    branches: [main]
    paths:
      - ".github/triggers/**"

concurrency:
  group: drive-tree-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Resolve folder + enumerate
        id: run
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
        run: |
          FOLDER="${{ github.event.inputs.folder }}"
          if [ -z "$FOLDER" ]; then
            LAST="$(tail -n1 .github/triggers/last-trigger.txt 2>/dev/null || true)"
            # token: drive-tree:<urlOrId>  (id chars or a full folders/<id> URL)
            FOLDER="$(echo "$LAST" | sed -n 's/.*drive-tree:\(\S\{1,\}\).*/\1/p')"
          fi
          if [ -z "$FOLDER" ]; then
            echo "No folder requested (no input, no drive-tree: token) — skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Enumerating: $FOLDER"
          node scripts/drive-tree.mjs "$FOLDER" --out drive-tree.json

      - name: Commit drive-tree.json
        if: steps.run.outputs.skip != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- drive-tree.json 2>/dev/null; then
            git add drive-tree.json
            git commit -m "drive-tree: enumerate folder [skip ci]"
            git push
          else
            echo "drive-tree.json unchanged."
          fi
