name: Sync Notion → PDP HTML

on:
  schedule:
    # every 5 minutes — GitHub's reliable minimum (*/2 gets throttled to 15–30 min under load)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # allow manual trigger from the Actions tab

concurrency:
  group: sync-notion
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund

      - name: Run sync
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node sync-notion.mjs

      - name: Generate cinematic section titles from images
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-cine-titles.mjs

      - name: Rebuild index.html from Notion
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node update-index.mjs

      - name: Commit and push (with rebase retry)
        run: |
          git config user.name "nac-notion-bot"
          git config user.email "nac-notion-bot@users.noreply.github.com"
          if git diff --quiet -- properties/ index.html; then
            echo "No HTML changes."
            exit 0
          fi
          git add properties/ index.html
          git commit -m "chore(notion-sync): refresh PDP content from Notion"

          # Retry push up to 5 times — rebase on top of main if it has moved
          # while this run was working. This prevents silent skips when other
          # commits land mid-run.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed — fetching and rebasing"
            git fetch origin main
            if ! git rebase origin/main; then
              echo "Rebase conflict — bailing out so a future run can re-derive from Notion"
              git rebase --abort
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "Push failed after 5 attempts"
          exit 1
