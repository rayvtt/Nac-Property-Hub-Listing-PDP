name: SEO Tasks → Apply Approved Fixes

on:
  schedule:
    # Daily at 10:00 UTC — picks up any tasks the user flipped to Approved
    # since the last run. Idempotent: skips tasks already Applied.
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      max_tasks:
        description: "Max tasks to apply per run"
        required: false
        default: "30"
      scope:
        description: "Comma-separated surfaces (pdp,brochure,hub,tool,blog,sitewide)"
        required: false
        default: "pdp,brochure,hub,tool,blog,sitewide"
      dry_run:
        description: "Print actions, no writes (true/false)"
        required: false
        default: "true"
  push:
    paths:
      - ".github/triggers/seo-apply.json"

concurrency:
  # Own group (daily 10:00 schedule; out-of-band of the */5 swarm). TODO: port
  # the wp() retry/backoff helper to seo-apply.mjs to harden against the
  # occasional Imunify360 collision when 10:00 lands on a */5 tick.
  group: seo-apply
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Resolve params
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Cron: LIVE mode with full scope, no human in the loop
            MAX=40
            SCOPE=pdp,brochure,hub,tool,blog,sitewide
            DRY=false
          elif [ "${{ github.event_name }}" = "push" ]; then
            F=.github/triggers/seo-apply.json
            MAX=$(jq -r '.max_tasks // empty' "$F"); [ -z "$MAX" ] && MAX=30
            SCOPE=$(jq -r '.scope // empty' "$F"); [ -z "$SCOPE" ] && SCOPE=pdp,brochure,hub,tool,blog,sitewide
            DRY=$(jq -r '.dry_run // empty' "$F"); [ -z "$DRY" ] && DRY=false
          else
            MAX="${{ inputs.max_tasks }}"
            SCOPE="${{ inputs.scope }}"
            DRY="${{ inputs.dry_run }}"
          fi
          echo "max_tasks=$MAX" >> $GITHUB_OUTPUT
          echo "scope=$SCOPE" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY" >> $GITHUB_OUTPUT
          echo "Resolved: max=$MAX, scope=$SCOPE, dry=$DRY"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Apply
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_USER: ${{ vars.WP_USER || 'admin_web' }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          MAX_TASKS: ${{ steps.params.outputs.max_tasks }}
          SCOPE: ${{ steps.params.outputs.scope }}
          DRY_RUN: ${{ steps.params.outputs.dry_run }}
        run: node seo-apply.mjs
