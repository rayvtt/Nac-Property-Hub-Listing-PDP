name: Audit AU Listings (read-only)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/audit-au.mjs"

concurrency:
  group: audit-au
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install deps
        working-directory: scripts
        run: npm install --no-audit --no-fund
      - name: Audit
        working-directory: scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || '35848ec25e86803283acc7ad989649c9' }}
        run: node audit-au.mjs
